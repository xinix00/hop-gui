<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyRun Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>EasyRun</h1>
        <input type="text" id="endpoint" placeholder="agent:8080" value="localhost:8080">
        <button onclick="app.connect()">Connect</button>
        <label><input type="checkbox" id="autoRefresh" checked> Auto</label>
        <span class="refresh" id="lastUpdate"></span>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="agentCount">-</div>
            <div class="stat-label">Agents</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="runningTasks">-</div>
            <div class="stat-label">Running</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="totalTasks">-</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat">
            <div class="stat-value"><code id="leaderAddr">-</code></div>
            <div class="stat-label">Leader</div>
        </div>
    </div>

    <div id="error"></div>

    <div class="tabs">
        <button class="tab active" onclick="app.showTab('agents')">Agents</button>
        <button class="tab" onclick="app.showTab('jobs')">Jobs</button>
        <button class="tab" onclick="app.showTab('tasks')">Tasks</button>
    </div>

    <!-- Agents Tab -->
    <div id="tab-agents" class="tab-content active">
        <div class="panel">
            <table id="agentsTable">
                <thead><tr><th>ID</th><th>Endpoint</th><th>Last Seen</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Jobs Tab -->
    <div id="tab-jobs" class="tab-content">
        <div class="panel">
            <div class="panel-header">
                <h2>Jobs</h2>
                <button onclick="app.toggleNewJob()">+ New Job</button>
            </div>

            <div id="newJobForm" class="form hidden">
                <div class="form-row">
                    <input type="text" id="jobName" placeholder="Job name">
                    <input type="text" id="jobCommand" placeholder="Command (e.g., ./myapp)">
                </div>
                <div class="form-row">
                    <input type="number" id="jobCount" placeholder="Count (-1 = all)" value="1">
                    <input type="text" id="jobEnv" placeholder="ENV=value,FOO=bar">
                </div>
                <div class="form-row">
                    <button onclick="app.startJob()">Start Job</button>
                    <button class="secondary" onclick="app.toggleNewJob()">Cancel</button>
                </div>
            </div>

            <table id="jobsTable">
                <thead><tr><th>ID</th><th>Name</th><th>Command</th><th>Running</th><th>Status</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Tasks Tab -->
    <div id="tab-tasks" class="tab-content">
        <div class="panel">
            <table id="tasksTable">
                <thead><tr><th>Task</th><th>Job</th><th>Agent</th><th>Ports</th><th>State</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Log Modal -->
    <div id="logModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Logs: <span id="logTaskId"></span></h3>
                <div class="log-controls">
                    <button onclick="app.switchStream('stdout')" id="btnStdout" class="active">stdout</button>
                    <button onclick="app.switchStream('stderr')" id="btnStderr">stderr</button>
                    <button onclick="app.closeLogs()" class="danger">Close</button>
                </div>
            </div>
            <pre id="logOutput"></pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
