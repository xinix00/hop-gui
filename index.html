<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyRun Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>EasyRun</h1>
        <input type="text" id="endpoint" placeholder="agent:8080" value="localhost:8080">
        <button onclick="app.connect()">Connect</button>
        <label><input type="checkbox" id="autoRefresh" checked> Auto</label>
        <span class="refresh" id="lastUpdate"></span>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="agentCount">-</div>
            <div class="stat-label">Agents</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="runningTasks">-</div>
            <div class="stat-label">Running</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="totalTasks">-</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat leader">
            <div class="stat-value" id="leaderAddr">-</div>
            <div class="stat-label">Leader</div>
        </div>
    </div>

    <div id="error"></div>

    <div class="grid">
        <div class="panel">
            <h2>Agents</h2>
            <table id="agentsTable">
                <thead><tr><th>ID</th><th>Endpoint</th><th>Last Seen</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="panel">
            <h2>Jobs</h2>
            <table id="jobsTable">
                <thead><tr><th>ID</th><th>Name</th><th>Command</th><th>Count</th><th></th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="panel">
        <h2>Tasks</h2>
        <table id="tasksTable">
            <thead><tr><th>Task</th><th>Job</th><th>Agent</th><th>Ports</th><th>State</th><th>Logs</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="logModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Logs: <span id="logTaskId"></span></h3>
                <div class="log-controls">
                    <button onclick="app.switchStream('stdout')" id="btnStdout" class="active">stdout</button>
                    <button onclick="app.switchStream('stderr')" id="btnStderr">stderr</button>
                    <button onclick="app.closeLogs()" class="danger">Close</button>
                </div>
            </div>
            <pre id="logOutput"></pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
