<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyRun Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { color: #0f0; margin-bottom: 20px; }
        h2 { color: #888; font-size: 14px; text-transform: uppercase; margin: 20px 0 10px; }
        .header { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        input { background: #16213e; border: 1px solid #333; color: #fff; padding: 8px 12px; border-radius: 4px; font-size: 14px; }
        input:focus { outline: none; border-color: #0f0; }
        button { background: #0f0; color: #000; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0c0; }
        button.danger { background: #f44; }
        button.danger:hover { background: #d33; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat { background: #16213e; padding: 15px 20px; border-radius: 8px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #0f0; }
        .stat-label { font-size: 12px; color: #888; }
        table { width: 100%; border-collapse: collapse; background: #16213e; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #0e1628; color: #888; font-size: 12px; text-transform: uppercase; }
        tr:hover { background: #1e2a4a; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status.running { background: #0f02; color: #0f0; }
        .status.stopped { background: #f442; color: #f44; }
        .status.failed { background: #f442; color: #f44; }
        .error { background: #f442; color: #f44; padding: 10px; border-radius: 4px; margin: 10px 0; }
        .refresh { color: #888; font-size: 12px; margin-left: auto; }
    </style>
</head>
<body>
    <div class="header">
        <h1>EasyRun</h1>
        <input type="text" id="endpoint" placeholder="agent:8080" value="localhost:8080">
        <button onclick="refresh()">Connect</button>
        <label><input type="checkbox" id="autoRefresh" checked> Auto-refresh</label>
        <span class="refresh" id="lastUpdate"></span>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="agentCount">-</div>
            <div class="stat-label">Agents</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="runningTasks">-</div>
            <div class="stat-label">Running Tasks</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="totalTasks">-</div>
            <div class="stat-label">Total Tasks</div>
        </div>
    </div>

    <div id="error"></div>

    <h2>Jobs</h2>
    <table id="jobsTable">
        <thead><tr><th>ID</th><th>Name</th><th>Command</th><th>Count</th><th>Actions</th></tr></thead>
        <tbody></tbody>
    </table>

    <h2>Tasks by Agent</h2>
    <div id="tasksContainer"></div>

    <script>
        let refreshInterval;

        function getEndpoint() {
            const ep = document.getElementById('endpoint').value;
            return ep.startsWith('http') ? ep : 'http://' + ep;
        }

        async function fetchAPI(path, options = {}) {
            const resp = await fetch(getEndpoint() + path, options);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            if (resp.status === 204) return null;
            return resp.json();
        }

        async function refresh() {
            try {
                document.getElementById('error').innerHTML = '';

                const [status, jobs] = await Promise.all([
                    fetchAPI('/v1/status'),
                    fetchAPI('/v1/jobs')
                ]);

                // Update stats
                document.getElementById('agentCount').textContent = status.agents;
                document.getElementById('runningTasks').textContent = status.running_tasks;
                document.getElementById('totalTasks').textContent = status.total_tasks;

                // Update jobs table
                const jobsBody = document.querySelector('#jobsTable tbody');
                jobsBody.innerHTML = jobs.map(job => `
                    <tr>
                        <td><code>${job.id}</code></td>
                        <td>${job.name}</td>
                        <td><code>${job.command}</code></td>
                        <td>${job.count || 1}</td>
                        <td><button class="danger" onclick="stopJob('${job.id}')">Stop</button></td>
                    </tr>
                `).join('') || '<tr><td colspan="5" style="color:#888">No jobs</td></tr>';

                // Update tasks by agent
                const container = document.getElementById('tasksContainer');
                container.innerHTML = '';

                for (const [agentId, tasks] of Object.entries(status.tasks_by_agent || {})) {
                    const table = document.createElement('table');
                    table.innerHTML = `
                        <thead><tr><th colspan="4">${agentId}</th></tr>
                        <tr><th>Task ID</th><th>Job</th><th>Ports</th><th>State</th></tr></thead>
                        <tbody>
                            ${tasks.map(t => `
                                <tr>
                                    <td><code>${t.id.slice(0,8)}</code></td>
                                    <td>${t.job_name}</td>
                                    <td>${Object.entries(t.ports || {}).map(([k,v]) => `${k}:${v}`).join(', ') || '-'}</td>
                                    <td><span class="status ${t.state}">${t.state}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    `;
                    container.appendChild(table);
                }

                document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();

                // Setup auto-refresh
                if (document.getElementById('autoRefresh').checked && !refreshInterval) {
                    refreshInterval = setInterval(refresh, 5000);
                }
            } catch (err) {
                document.getElementById('error').innerHTML = `<div class="error">Error: ${err.message}</div>`;
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }

        async function stopJob(jobId) {
            if (!confirm(`Stop job ${jobId}?`)) return;
            try {
                await fetchAPI(`/v1/jobs/${jobId}`, { method: 'DELETE' });
                refresh();
            } catch (err) {
                alert('Failed to stop job: ' + err.message);
            }
        }

        document.getElementById('autoRefresh').addEventListener('change', (e) => {
            if (!e.target.checked) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            } else {
                refresh();
            }
        });

        document.getElementById('endpoint').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') refresh();
        });

        // Initial load
        refresh();
    </script>
</body>
</html>
