<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyRun Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cluster-bar">
        <div class="cluster-tabs" id="clusterTabs"></div>
        <button class="cluster-add" id="clusterAddBtn" onclick="app.showAddCluster()">+</button>
        <span class="refresh" id="lastUpdate"></span>
    </div>

    <div id="clusterForm" class="cluster-form hidden">
        <input type="text" id="clusterName" placeholder="Naam (bijv. prod)">
        <input type="text" id="clusterEndpoint" placeholder="Adres (bijv. 10.0.0.1:8080)">
        <input type="text" id="clusterApiKey" placeholder="API Key (optioneel)">
        <button onclick="app.addClusterFromForm()">Add</button>
        <button class="secondary" onclick="app.hideAddCluster()">Cancel</button>
    </div>

    <div class="stats" id="statsContainer">
        <div class="stat">
            <div class="stat-value" id="agentCount">-</div>
            <div class="stat-label">Agents</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="totalPlaced">-</div>
            <div class="stat-label">Placed</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="totalJobs">-</div>
            <div class="stat-label">Jobs</div>
        </div>
        <div class="stat">
            <div class="stat-value"><code id="leaderAddr">-</code></div>
            <div class="stat-label">Leader</div>
        </div>
    </div>

    <div id="settleBadge" class="settle-badge">Leader settling — waiting for agents to register...</div>
    <div id="sseStatus"></div>
    <div id="error"></div>

    <div class="tabs">
        <button class="tab active" onclick="app.showTab('agents')">Agents</button>
        <button class="tab" onclick="app.showTab('jobs')">Jobs</button>
    </div>

    <!-- Agents Tab -->
    <div id="tab-agents" class="tab-content active">
        <div class="panel">
            <table id="agentsTable">
                <thead><tr><th>ID</th><th>Version</th><th>Endpoint</th><th>CPU</th><th>Memory</th><th>Tasks</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Jobs Tab -->
    <div id="tab-jobs" class="tab-content">
        <div class="panel">
            <!-- Jobs list view -->
            <div id="jobsListView">
                <div class="panel-header">
                    <h2>Jobs</h2>
                    <button onclick="app.toggleNewJob()">+ New Job</button>
                </div>

                <div id="newJobForm" class="form hidden">
                    <textarea id="jobJson" rows="6" placeholder='{"name": "myapp", "command": "./myapp", "count": 1}'></textarea>
                    <div class="form-row">
                        <button onclick="app.startJob()">Start Job</button>
                        <button class="secondary" onclick="app.toggleNewJob()">Cancel</button>
                    </div>
                </div>

                <table id="jobsTable">
                    <thead><tr><th></th><th>Prio</th><th>Name</th><th>Command</th><th>Running</th><th>Status</th><th></th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <!-- Job detail view (hidden by default) -->
            <div id="jobDetailView" class="hidden">
                <div class="panel-header">
                    <div class="job-detail-title">
                        <button class="secondary small" onclick="app.closeJobDetail()">&larr; Jobs</button>
                        <h2 id="jobDetailName"></h2>
                        <span id="jobDetailStatus" class="status"></span>
                    </div>
                    <button class="danger small" id="jobDetailDelete">Delete</button>
                </div>
                <div id="jobDetailInfo" class="job-detail-info"></div>
                <table id="jobTasksTable">
                    <thead><tr><th>Task</th><th>Agent</th><th>Ports</th><th>CPU</th><th>Mem</th><th>Restarts</th><th>State</th><th></th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Log Modal -->
    <div id="logModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Logs: <span id="logTaskId"></span></h3>
                <div class="log-controls">
                    <button onclick="app.switchStream('stdout')" id="btnStdout" class="active">stdout</button>
                    <button onclick="app.switchStream('stderr')" id="btnStderr">stderr</button>
                    <button onclick="app.closeLogs()" class="danger">Close</button>
                </div>
            </div>
            <pre id="logOutput"></pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
